<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="100" fill="#061d3d"/>
  <!-- Nucleus -->
  <circle cx="256" cy="256" r="28" fill="white" opacity="0.95"/>
  <circle cx="256" cy="256" r="40" fill="none" stroke="white" stroke-width="3" opacity="0.15"/>
  <!-- Orbit 1 -->
  <ellipse cx="256" cy="256" rx="150" ry="50" fill="none" stroke="#7dd3fc" stroke-width="3" opacity="0.7"/>
  <!-- Orbit 2 rotated 60deg -->
  <ellipse cx="256" cy="256" rx="150" ry="50" fill="none" stroke="#7dd3fc" stroke-width="3" opacity="0.7"
           transform="rotate(60 256 256)"/>
  <!-- Orbit 3 rotated -60deg -->
  <ellipse cx="256" cy="256" rx="150" ry="50" fill="none" stroke="#7dd3fc" stroke-width="3" opacity="0.7"
           transform="rotate(-60 256 256)"/>
  <!-- Electrons -->
  <circle cx="256" cy="206" r="12" fill="#7dd3fc"/>
  <circle cx="386" cy="281" r="12" fill="#7dd3fc" transform="rotate(60 256 256)"/>
  <circle cx="126" cy="281" r="12" fill="#7dd3fc" transform="rotate(-60 256 256)"/>
  <!-- Title text -->
  <text x="256" y="430" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900"
        font-size="52" fill="white" opacity="0.85">dist e⁻</text>
</svg>
